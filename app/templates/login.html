<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 · Emby Request</title>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="login-header">
        <h1>欢迎回来</h1>
        <p>登录以管理求片与追新进度</p>
      </div>

      <form action="/login" method="post">
        <input type="hidden" name="_csrf" value="{{ csrf_token }}">

        <div class="field">
          <label class="field-label">账号</label>
          <input class="field-input" name="username" autocomplete="username" required placeholder="请输入用户名">
        </div>

        <div class="field">
          <label class="field-label">密码</label>
          <input class="field-input" name="password" type="password" autocomplete="current-password" required placeholder="请输入密码">
        </div>

        <button type="submit" class="btn btn-primary">登录</button>
      </form>
    </div>

    <div class="login-footer">
      <p>Emby Request · 求片与追新管理系统</p>
    </div>
  </div>
</body>
</html>
