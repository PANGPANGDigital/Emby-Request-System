<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f5f8fc">
  <title>{% block title %}Emby Request{% endblock %}</title>
  <link rel="icon" href="{{ logo_src }}?v={{ logo_version }}">
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>
  <aside class="sidebar">
    <a class="brand" href="/dashboard">
      <img src="{{ logo_src }}?v={{ logo_version }}" alt="Emby Request Logo" class="brand-logo-img">
      <span class="brand-name">Emby Request</span>
    </a>

    <nav class="nav-list" aria-label="主导航">
      <a class="nav-item {% if request.url.path == '/dashboard' %}active{% endif %}" href="/dashboard">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0a1 1 0 01-1-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 01-1 1" stroke-linecap="round" stroke-linejoin="round"/></svg>
        工作台
      </a>
      <a class="nav-item {% if request.url.path == '/search' %}active{% endif %}" href="/search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35" stroke-linecap="round"/></svg>
        资源搜索
      </a>
      <a class="nav-item {% if request.url.path == '/requests/recent' %}active{% endif %}" href="/requests/recent">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 4v16m8-8H4" stroke-linecap="round"/></svg>
        求片广场
      </a>
      {% if current_user and current_user.is_admin %}
      <a class="nav-item {% if request.url.path == '/admin/requests' %}active{% endif %}" href="/admin/requests">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z" stroke-linecap="round" stroke-linejoin="round"/><path d="M14 2v6h6M16 13H8M16 17H8M10 9H8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        处理记录
      </a>
      <a class="nav-item {% if request.url.path == '/admin/users' %}active{% endif %}" href="/admin/users">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="12" cy="7" r="4"/></svg>
        用户
      </a>
      <a class="nav-item {% if request.url.path == '/admin/settings' %}active{% endif %}" href="/admin/settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82.33 1.65 1.65 0 00-.58 1.82 2 2 0 01-2.83-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.82-.58 2 2 0 01-2.83-2.83l-.06.06a1.65 1.65 0 00-.33-1.82 1.65 1.65 0 00-1.82-.58 2 2 0 012.83 2.83l.06.06a1.65 1.65 0 00.33 1.82 1.65 1.65 0 001.82.58z" stroke-linejoin="round"/></svg>
        站点配置
      </a>
      {% endif %}
    </nav>
  </aside>

  <div class="main">
    <header class="topbar">
      <div class="topbar-left">
        <button class="mobile-toggle" id="menuToggle" aria-label="菜单">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16" stroke-linecap="round"/></svg>
        </button>
        {% block page_header %}{% endblock %}
      </div>
      <div class="topbar-right">
        {% if current_user %}
        <form action="/logout" method="post" style="display:inline-flex;align-items:center;gap:6px;">
          <input type="hidden" name="_csrf" value="{{ csrf_token }}">
          <button class="btn btn-ghost" type="submit">退出</button>
        </form>
        {% endif %}
      </div>
    </header>

    <main class="content">
      {% if flash %}<div class="notice notice-{{ flash.level }}" role="status">{{ flash.message }}</div>{% endif %}
      {% block content %}{% endblock %}
    </main>
  </div>

  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <script>
    const toggle = document.getElementById('menuToggle');
    const overlay = document.getElementById('sidebarOverlay');
    const open = () => document.body.classList.add('sidebar-open');
    const close = () => document.body.classList.remove('sidebar-open');
    if (toggle) {
      toggle.addEventListener('click', () => document.body.classList.contains('sidebar-open') ? close() : open());
      overlay.addEventListener('click', close);
      document.querySelectorAll('.sidebar .nav-item').forEach(item => item.addEventListener('click', close));
    }
    document.querySelectorAll('[data-dialog-open]').forEach(button => {
      button.addEventListener('click', () => document.getElementById(button.dataset.dialogOpen)?.showModal());
    });
    document.querySelectorAll('[data-dialog-close]').forEach(button => {
      button.addEventListener('click', () => button.closest('dialog')?.close());
    });
  </script>
</body>
</html>
