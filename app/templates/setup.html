<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>首次配置 · Emby Request</title>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>
  <div class="setup-page">
    <div class="setup-header">
      <h1>配置你的求片中心</h1>
      <p>创建管理员账号并连接 Emby 与 TMDB，开始管理求片与追新进度。</p>
    </div>

    <div class="setup-card">
      <form action="/setup" method="post">
        <input type="hidden" name="_csrf" value="{{ csrf_token }}">

        <div class="form-section">
          <div class="form-section-header">
            <div class="form-section-icon purple">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
              </svg>
            </div>
            <div>
              <div class="form-section-title">管理员账号</div>
              <div class="form-section-desc">创建系统管理员，用于后续登录管理</div>
            </div>
          </div>
          <div class="form-grid two-col">
            <div class="field">
              <label class="field-label">管理员账号 <span class="required">*</span></label>
              <input class="field-input" name="username" minlength="3" autocomplete="username" required placeholder="至少 3 位">
            </div>
            <div class="field">
              <label class="field-label">管理员密码 <span class="required">*</span></label>
              <input class="field-input" name="password" type="password" minlength="10" autocomplete="new-password" required placeholder="至少 10 位">
            </div>
          </div>
        </div>

        <div class="form-section">
          <div class="form-section-header">
            <div class="form-section-icon blue">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                <path d="M2 17l10 5 10-5"/>
                <path d="M2 12l10 5 10-5"/>
              </svg>
            </div>
            <div>
              <div class="form-section-title">服务连接</div>
              <div class="form-section-desc">连接 Emby 媒体服务器与 TMDB 数据库</div>
            </div>
          </div>
          <div class="form-grid">
            <div class="field">
              <label class="field-label">Emby 服务地址 <span class="required">*</span></label>
              <input class="field-input" name="emby_url" type="url" required placeholder="https://emby.example.com">
              <div class="field-hint">输入 Emby 服务器的完整地址，包括 <code>http://</code> 或 <code>https://</code></div>
            </div>
            <div class="field">
              <label class="field-label">Emby API Key <span class="required">*</span></label>
              <input class="field-input" name="emby_api_key" type="password" required placeholder="在 Emby 控制台生成的 API Key">
            </div>
            <div class="field">
              <label class="field-label">TMDB API Key <span class="required">*</span></label>
              <input class="field-input" name="tmdb_api_key" type="password" required placeholder="TMDB v3 API Key">
              <div class="field-hint">用于搜索内容；可在 <a href="https://www.themoviedb.org/settings/api" target="_blank" rel="noopener">TMDB 账号设置</a> 中创建。</div>
            </div>
          </div>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn btn-primary">完成配置并创建管理员</button>
        </div>

        <div class="security-note">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0110 0v4"/>
          </svg>
          <span>API 密钥与密码均加密存储在数据库中，不会以明文保存。</span>
        </div>
      </form>
    </div>

    <div class="setup-footer">
      <p>Emby Request · 求片与追新管理系统</p>
    </div>
  </div>
</body>
</html>
